<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

            <h2 class="text-lg">

            <span class="content-tag">Wearables</span>
            <h2 class="text-lg">
              Company launches smartwatch capable of monitoring mental health, offering valuable insights for person...

          </figcaption>
        </figure>

            <span class="content-tag">Virtual Reality</span>
            <h2 class="text-lg">
              Schools are adopting VR technology to provide immersive experiences, transforming traditional learning.
            </h2>
          </figcaption>
        </figure>
